<svg width="900" height="280" viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#7F77DD" stroke-width="0.3" opacity="0.25"/>
    </pattern>
    <linearGradient id="fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0d1117" stop-opacity="0"/>
      <stop offset="20%" stop-color="#0d1117" stop-opacity="1"/>
      <stop offset="80%" stop-color="#0d1117" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0d1117" stop-opacity="0"/>
      <stop offset="30%" stop-color="#7F77DD" stop-opacity="1"/>
      <stop offset="70%" stop-color="#7F77DD" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" fill="#0d1117"/>

  <!-- Grid pattern -->
  <rect width="900" height="280" fill="url(#grid)"/>

  <!-- Fade overlay -->
  <rect width="900" height="280" fill="url(#fade)"/>

  <!-- Corner dot accents -->
  <circle cx="60" cy="60" r="2" fill="#7F77DD" opacity="0.6"/>
  <circle cx="840" cy="60" r="2" fill="#7F77DD" opacity="0.6"/>
  <circle cx="60" cy="220" r="2" fill="#7F77DD" opacity="0.6"/>
  <circle cx="840" cy="220" r="2" fill="#7F77DD" opacity="0.6"/>

  <!-- Accent dots cluster top-right -->
  <circle cx="760" cy="80" r="1.5" fill="#7F77DD" opacity="0.5"/>
  <circle cx="775" cy="72" r="1" fill="#7F77DD" opacity="0.4"/>
  <circle cx="748" cy="68" r="1" fill="#7F77DD" opacity="0.3"/>
  <circle cx="780" cy="90" r="1" fill="#7F77DD" opacity="0.3"/>

  <!-- Accent dots cluster bottom-left -->
  <circle cx="130" cy="200" r="1.5" fill="#7F77DD" opacity="0.4"/>
  <circle cx="118" cy="210" r="1" fill="#7F77DD" opacity="0.3"/>
  <circle cx="142" cy="212" r="1" fill="#7F77DD" opacity="0.3"/>

  <!-- Name -->
  <text x="450" y="118" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="52" font-weight="700" fill="#f0f6fc" text-anchor="middle"
        letter-spacing="-1">Harini Patsa</text>

  <!-- Accent line under name -->
  <rect x="200" y="130" width="500" height="1.5" fill="url(#accentLine)" rx="1"/>

  <!-- Role line -->
  <text x="450" y="162" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="16" font-weight="400" fill="#7F77DD" text-anchor="middle"
        letter-spacing="3">AI &amp; FULL-STACK DEVELOPER</text>

  <!-- Subtitle -->
  <text x="450" y="192" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="13" font-weight="400" fill="#8b949e" text-anchor="middle"
        letter-spacing="0.5">B.Tech CSE (AI)  ·  Python · JavaScript · Java  ·  Andhra Pradesh</text>

  <!-- Skill tags -->
  <!-- Full-Stack -->
  <rect x="183" y="212" width="90" height="24" rx="4" fill="#16143a" stroke="#7F77DD" stroke-width="0.8" opacity="0.9"/>
  <text x="228" y="228" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="11" fill="#AFA9EC" text-anchor="middle" letter-spacing="0.3">Full-Stack</text>

  <!-- AI / ML -->
  <rect x="283" y="212" width="72" height="24" rx="4" fill="#16143a" stroke="#7F77DD" stroke-width="0.8" opacity="0.9"/>
  <text x="319" y="228" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="11" fill="#AFA9EC" text-anchor="middle" letter-spacing="0.3">AI / ML</text>

  <!-- Backend -->
  <rect x="365" y="212" width="72" height="24" rx="4" fill="#16143a" stroke="#7F77DD" stroke-width="0.8" opacity="0.9"/>
  <text x="401" y="228" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="11" fill="#AFA9EC" text-anchor="middle" letter-spacing="0.3">Backend</text>

  <!-- DSA -->
  <rect x="447" y="212" width="60" height="24" rx="4" fill="#16143a" stroke="#7F77DD" stroke-width="0.8" opacity="0.9"/>
  <text x="477" y="228" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="11" fill="#AFA9EC" text-anchor="middle" letter-spacing="0.3">DSA</text>

  <!-- Java -->
  <rect x="517" y="212" width="60" height="24" rx="4" fill="#16143a" stroke="#7F77DD" stroke-width="0.8" opacity="0.9"/>
  <text x="547" y="228" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="11" fill="#AFA9EC" text-anchor="middle" letter-spacing="0.3">Java</text>

  <!-- Open to Internships -->
  <rect x="590" y="212" width="144" height="24" rx="4" fill="#110f2e" stroke="#534AB7" stroke-width="0.8" opacity="0.85"/>
  <text x="662" y="228" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="11" fill="#AFA9EC" text-anchor="middle" letter-spacing="0.3">Open to Internships</text>
</svg>
